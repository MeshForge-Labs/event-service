# Example Secret for event-service. Do NOT commit real secrets.
# Use same JWT_SECRET and JWT_ISSUER as auth-service so event-service accepts auth-service tokens.
apiVersion: v1
kind: Secret
metadata:
  name: event-service-secret
  labels:
    app: event-service
type: Opaque
stringData:
  DATABASE_URL: "jdbc:postgresql://postgres:5432/event_db"
  DATABASE_USERNAME: "event_user"
  DATABASE_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "SAME_AS_AUTH_SERVICE_AT_LEAST_32_CHARS"
  JWT_ISSUER: "auth-service"
